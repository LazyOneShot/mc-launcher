# `version:` intentionally omitted — Compose v2 ignores it and warns about it.
services:
  api:
    build: .
    restart: unless-stopped
    # Bound to all interfaces. Rate limiting keys on X-Forwarded-For (see
    # Dockerfile) on the assumption that the only thing that can reach this
    # port is Nginx Proxy Manager — verify the host firewall actually blocks
    # 8000 from the public internet, otherwise that header is spoofable and
    # rate limits become bypassable per-request.
    ports:
      - "8000:8000"
    mem_limit: 1g
    cpus: "1.0"
    env_file:
      - .env
    volumes:
      # Bind mount, not a named volume. If this file doesn't exist on the host,
      # Docker creates a *directory* here and SQLite fails with
      # "unable to open database file". touch it first.
      - ./mc_launcher.db:/app/mc_launcher.db
